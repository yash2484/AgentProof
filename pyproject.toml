# Root configuration for the AgentProof monorepo.
# Individual packages (sdk/, server/, demo_agent/) have their own pyproject.toml files.
# This file configures workspace-wide tooling: ruff, pytest defaults.

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "**/migrations/**",
    "dashboard/**",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]
# E501: line length handled by formatter.
# UP042: `(str, Enum)` is deliberate (JSON-serializable enums, broad compat).
ignore = ["E501", "UP042"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's Depends()/Query() in argument defaults is the intended pattern.
"**/api/*.py" = ["B008"]
# Nested `with` is intentional in tests that exercise span/trace nesting.
"**/tests/**" = ["SIM117"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["sdk/tests", "server/tests"]