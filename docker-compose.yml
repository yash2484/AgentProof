services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agentproof
      POSTGRES_PASSWORD: agentproof
      POSTGRES_DB: agentproof
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentproof"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentproof:agentproof@postgres:5432/agentproof
      DATABASE_URL_SYNC: postgresql://agentproof:agentproof@postgres:5432/agentproof
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
    command: uvicorn agentproof_server.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./dashboard:/app
      - /app/node_modules

volumes:
  pgdata: